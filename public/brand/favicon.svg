<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Ghimtech">
  <!--
    Favicon. Optimized for 16-32px rendering.
    Slightly thicker stroke ratio (3.5 instead of 7 scaled-down) so the
    mark stays readable at tiny sizes. Less radial complexity.
  -->
  <rect width="32" height="32" rx="7" fill="#0a0d12" />
  <g fill="none" stroke="#3aa4ff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(16 16)">
    <!-- 22 * (32/64) = 11 radius. Centered on origin. -->
    <path d="M 5 -7 A 9 9 0 1 0 5 7" />
    <path d="M -1 0 L 5 0" />
  </g>
</svg>
