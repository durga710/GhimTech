<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Ghimtech — Founder operating system">
  <!--
    Open Graph card. 1200x630.
    Layout:
      - Top-left: small lockup
      - Center: headline + sub
      - Bottom-right: status pill
    Ambient: top-left radial signal blue, bottom-right radial vital emerald.
    Carbon base.
  -->
  <defs>
    <radialGradient id="ambient-signal" cx="15%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#3aa4ff" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#3aa4ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="ambient-vital" cx="90%" cy="95%" r="50%">
      <stop offset="0%" stop-color="#1fe294" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#1fe294" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#7ec4ff" />
      <stop offset="100%" stop-color="#3aa4ff" />
    </linearGradient>
  </defs>

  <!-- Carbon base -->
  <rect width="1200" height="630" fill="#040508" />
  <!-- Ambient lights -->
  <rect width="1200" height="630" fill="url(#ambient-signal)" />
  <rect width="1200" height="630" fill="url(#ambient-vital)" />

  <!-- Top-left lockup -->
  <g transform="translate(64 64)">
    <g stroke="#f4f6fa" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M 50 18 A 22 22 0 1 0 50 46" />
      <path d="M 36 32 L 50 32" />
    </g>
    <text x="92" y="44" fill="#f4f6fa"
          font-family="ui-sans-serif, system-ui, -apple-system, 'Geist', sans-serif"
          font-size="32" font-weight="500" letter-spacing="-0.02em">ghimtech</text>
  </g>

  <!-- Small label above headline -->
  <text x="64" y="280" fill="#66f5b8"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="14" font-weight="500" letter-spacing="0.24em">DURGA GHIMERAY · FOUNDER</text>

  <!-- Headline -->
  <text x="64" y="370" fill="url(#title-grad)"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Geist', sans-serif"
        font-size="76" font-weight="600" letter-spacing="-0.03em">Building healthcare</text>
  <text x="64" y="450" fill="url(#title-grad)"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Geist', sans-serif"
        font-size="76" font-weight="600" letter-spacing="-0.03em">operations, calmly.</text>

  <!-- Sub -->
  <text x="64" y="510" fill="#a1a8b4"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Geist', sans-serif"
        font-size="24" font-weight="400" letter-spacing="-0.005em">USMC veteran · Nepali entrepreneur · Founder of RayHealthEVV™</text>

  <!-- Bottom-right status pill -->
  <g transform="translate(940 540)">
    <rect x="0" y="0" width="200" height="44" rx="22" fill="rgba(15,18,24,0.6)" stroke="rgba(255,255,255,0.10)" stroke-width="1" />
    <circle cx="22" cy="22" r="4" fill="#1fe294">
      <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <text x="38" y="29" fill="#f4f6fa"
          font-family="ui-monospace, 'JetBrains Mono', monospace"
          font-size="13" font-weight="500" letter-spacing="0.18em">SYSTEMS NOMINAL</text>
  </g>

  <!-- Bottom-left domain -->
  <text x="64" y="566" fill="#8a92a1"
        font-family="ui-monospace, 'JetBrains Mono', monospace"
        font-size="14" font-weight="400" letter-spacing="0.12em">GHIMTECH.ORG</text>
</svg>
